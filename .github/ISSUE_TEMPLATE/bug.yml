name: Bug report
description: Something's broken or misbehaving
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in the fields below so we can reproduce and fix it quickly.

  - type: dropdown
    id: component
    attributes:
      label: Which component?
      options:
        - /archmap (generate)
        - /archmap:repair
        - /archmap:focus
        - /archmap:diff
        - SessionStart hook (detect-unmapped.sh)
        - PostToolUse hook (flag-stale-modules.sh)
        - HTML template / canvas rendering
        - architecture skill
        - .archmap.json config
        - Install / packaging
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal, numbered steps. Include the command you ran.
      placeholder: |
        1. cd my-project
        2. /archmap
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include any error message verbatim.
    validations:
      required: true

  - type: input
    id: archmap-version
    attributes:
      label: Archmap version
      description: "Run: cat .claude-plugin/plugin.json | jq -r .version"
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (git-bash)
        - Other
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: .archmap.json (if any)
      render: json

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, attached `docs/architecture.html`, repo characteristics (size, languages), etc.
