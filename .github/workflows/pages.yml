name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'templates/archmap-template.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Rebuild demo from current template
        run: python3 site/build-demo.py

      - name: Verify demo is up to date
        # If the committed demo.html differs from a fresh rebuild, fail so
        # contributors remember to regenerate after template changes.
        run: |
          if ! git diff --exit-code site/demo.html; then
            echo "::error::site/demo.html is out of date — run python3 site/build-demo.py and commit the result"
            exit 1
          fi
          echo "demo is up to date"

      - name: Sanity-check demo placeholders are fully substituted
        run: |
          if grep -q '{{' site/demo.html; then
            echo "::error::unsubstituted placeholders remain in site/demo.html"
            grep -n '{{' site/demo.html | head
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
