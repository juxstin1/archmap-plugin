<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0d1117"/>
  <!-- Three module nodes connected by edges, mimicking an archmap -->
  <g stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M16 20 L32 32"/>
    <path d="M48 20 L32 32"/>
    <path d="M32 32 L32 48"/>
  </g>
  <g fill="#06b6d4">
    <circle cx="16" cy="20" r="5"/>
    <circle cx="48" cy="20" r="5"/>
    <circle cx="32" cy="32" r="6"/>
    <circle cx="32" cy="48" r="5"/>
  </g>
</svg>
