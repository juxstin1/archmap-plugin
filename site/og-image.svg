<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f17"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#9fb4c9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#30363d" stroke-width="0.5" opacity="0.35">
    <path d="M0 50 H1200 M0 100 H1200 M0 150 H1200 M0 200 H1200 M0 250 H1200 M0 300 H1200 M0 350 H1200 M0 400 H1200 M0 450 H1200 M0 500 H1200 M0 550 H1200 M0 600 H1200"/>
    <path d="M50 0 V630 M100 0 V630 M150 0 V630 M200 0 V630 M250 0 V630 M300 0 V630 M350 0 V630 M400 0 V630 M450 0 V630 M500 0 V630 M550 0 V630 M600 0 V630 M650 0 V630 M700 0 V630 M750 0 V630 M800 0 V630 M850 0 V630 M900 0 V630 M950 0 V630 M1000 0 V630 M1050 0 V630 M1100 0 V630 M1150 0 V630"/>
  </g>

  <!-- Decorative archmap nodes (right side) -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-weight="600" font-size="13">
    <!-- edges -->
    <g stroke="#30363d" stroke-width="1" fill="none" opacity="0.6">
      <path d="M770 180 Q 820 210 855 245"/>
      <path d="M770 280 Q 830 300 855 320"/>
      <path d="M770 380 Q 830 370 855 395"/>
      <path d="M950 260 Q 1000 320 1030 410"/>
      <path d="M770 180 Q 870 230 1030 260"/>
    </g>
    <!-- nodes -->
    <g>
      <rect x="680" y="150" width="90" height="50" rx="8" fill="#58a6ff" fill-opacity="0.22" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="725" y="178" text-anchor="middle" fill="#58a6ff">/archmap</text>
      <text x="725" y="195" text-anchor="middle" fill="#8b949e" font-size="10">246 lines</text>
    </g>
    <g>
      <rect x="680" y="250" width="90" height="50" rx="8" fill="#bc8cff" fill-opacity="0.22" stroke="#bc8cff" stroke-width="1.5"/>
      <text x="725" y="278" text-anchor="middle" fill="#bc8cff">:repair</text>
      <text x="725" y="295" text-anchor="middle" fill="#8b949e" font-size="10">221 lines</text>
    </g>
    <g>
      <rect x="680" y="350" width="90" height="50" rx="8" fill="#d29922" fill-opacity="0.22" stroke="#d29922" stroke-width="1.5"/>
      <text x="725" y="378" text-anchor="middle" fill="#d29922">:focus</text>
      <text x="725" y="395" text-anchor="middle" fill="#8b949e" font-size="10">178 lines</text>
    </g>
    <g>
      <rect x="855" y="220" width="100" height="50" rx="8" fill="#3fb950" fill-opacity="0.22" stroke="#3fb950" stroke-width="1.5"/>
      <text x="905" y="248" text-anchor="middle" fill="#3fb950">explorer</text>
      <text x="905" y="265" text-anchor="middle" fill="#8b949e" font-size="10">198 lines</text>
    </g>
    <g>
      <rect x="855" y="300" width="100" height="50" rx="8" fill="#3fb950" fill-opacity="0.22" stroke="#3fb950" stroke-width="1.5"/>
      <text x="905" y="328" text-anchor="middle" fill="#3fb950">repair agent</text>
      <text x="905" y="345" text-anchor="middle" fill="#8b949e" font-size="10">258 lines</text>
    </g>
    <g>
      <rect x="855" y="380" width="100" height="50" rx="8" fill="#f85149" fill-opacity="0.22" stroke="#f85149" stroke-width="1.5"/>
      <text x="905" y="408" text-anchor="middle" fill="#f85149">skill</text>
      <text x="905" y="425" text-anchor="middle" fill="#8b949e" font-size="10">82 lines</text>
    </g>
    <g>
      <rect x="1020" y="240" width="120" height="60" rx="8" fill="#58a6ff" fill-opacity="0.22" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="1080" y="272" text-anchor="middle" fill="#58a6ff">template.html</text>
      <text x="1080" y="290" text-anchor="middle" fill="#8b949e" font-size="10">720 lines</text>
    </g>
    <g>
      <rect x="1020" y="390" width="120" height="50" rx="8" fill="#8b949e" fill-opacity="0.22" stroke="#8b949e" stroke-width="1.5"/>
      <text x="1080" y="418" text-anchor="middle" fill="#c9d1d9">hooks</text>
      <text x="1080" y="435" text-anchor="middle" fill="#8b949e" font-size="10">194 lines</text>
    </g>
  </g>

  <!-- Title -->
  <g font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
    <text x="80" y="175" fill="#06b6d4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14" letter-spacing="2">CLAUDE CODE · PLUGIN</text>
    <text x="80" y="300" fill="url(#titleGrad)" font-size="110" font-weight="800" letter-spacing="-3">archmap</text>
    <text x="80" y="370" fill="#c9d1d9" font-size="30" font-weight="500">Interactive architecture maps</text>
    <text x="80" y="410" fill="#c9d1d9" font-size="30" font-weight="500">for any codebase.</text>
    <text x="80" y="510" fill="#8b949e" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="18">/archmap  ·  /archmap:repair  ·  /archmap:focus  ·  /archmap:diff</text>
    <text x="80" y="565" fill="#8b949e" font-size="16">Self-contained HTML canvas. Zero runtime dependencies. MIT.</text>
  </g>
</svg>
